<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate City Racer</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:10px;
}

#score{
font-size:18px;
}

#message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:60px;
display:none;
text-align:center;
text-shadow:0 0 25px black;
}

#controls{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
}

button{
font-size:30px;
padding:18px 24px;
margin:8px;
border:none;
border-radius:14px;
background:#ffffffaa;
}
</style>
</head>

<body>

<div id="ui">
<div id="score">Coins: 0</div>
<div>Tilt phone to steer</div>
</div>

<div id="message"></div>

<div id="controls">
<button id="left">⬅</button>
<button id="right">➡</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/* Scene */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050520);

/* Camera */

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
8000
);

camera.position.set(0,6,14);

/* Renderer */

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* Lights */

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,40,20);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.6));

/* ROAD */

const road = new THREE.Mesh(
new THREE.PlaneGeometry(20,6000),
new THREE.MeshStandardMaterial({color:0x444444})
);

road.rotation.x = -Math.PI/2;
scene.add(road);

/* Colorful Buildings */

function randomColor(){
const colors=[
0xff4d4d,
0xffa64d,
0xffff4d,
0x4dff88,
0x4dd2ff,
0x7a4dff
];
return colors[Math.floor(Math.random()*colors.length)];
}

function createBuilding(x,z){

let h = Math.random()*60 + 20;

let b = new THREE.Mesh(
new THREE.BoxGeometry(12,h,12),
new THREE.MeshStandardMaterial({color:randomColor()})
);

b.position.set(x,h/2,z);
scene.add(b);

}

for(let i=-3000;i<500;i+=35){
createBuilding(-32,i);
createBuilding(32,i);
}

/* Player Car */

const car = new THREE.Mesh(
new THREE.BoxGeometry(2,0.5,4),
new THREE.MeshStandardMaterial({color:0xff0000})
);

car.position.y = 0.25;
scene.add(car);

/* Enemy Cars */

const enemies = [];

function spawnEnemy(z){

let e = new THREE.Mesh(
new THREE.BoxGeometry(2,0.5,4),
new THREE.MeshStandardMaterial({color:0xffff00})
);

e.position.set(Math.random()*12-6,0.25,z);

scene.add(e);
enemies.push(e);

}

for(let i=0;i<80;i++){
spawnEnemy(-120-i*40);
}

/* Coins */

const coins = [];

function spawnCoin(z){

let c = new THREE.Mesh(
new THREE.CylinderGeometry(0.6,0.6,0.2,20),
new THREE.MeshStandardMaterial({color:0xffd700})
);

c.rotation.x = Math.PI/2;
c.position.set(Math.random()*12-6,1,z);

scene.add(c);
coins.push(c);

}

for(let i=0;i<120;i++){
spawnCoin(-100-i*35);
}

/* Finish Line */

const finish = new THREE.Mesh(
new THREE.BoxGeometry(22,6,1),
new THREE.MeshStandardMaterial({color:0xffffff})
);

finish.position.set(0,3,-5800);
scene.add(finish);

/* Finish pillars */

function pillar(x){
let p=new THREE.Mesh(
new THREE.CylinderGeometry(1,1,8,16),
new THREE.MeshStandardMaterial({color:0xff0000})
);
p.position.set(x,4,-5800);
scene.add(p);
}

pillar(-10);
pillar(10);

/* Controls */

let keys = {};
let tilt = 0;

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

/* Mobile tilt steering */

window.addEventListener("deviceorientation", function(event){

tilt = event.gamma; // left/right tilt

});

/* Mobile buttons fallback */

left.ontouchstart = ()=>keys["ArrowLeft"]=true;
right.ontouchstart = ()=>keys["ArrowRight"]=true;

left.ontouchend = ()=>keys["ArrowLeft"]=false;
right.ontouchend = ()=>keys["ArrowRight"]=false;

/* Game State */

let score = 0;
let gameOver = false;

const scoreDisplay = document.getElementById("score");

/* Detect mobile */

const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

/* Game Loop */

function animate(){

requestAnimationFrame(animate);

if(!gameOver){

let speed = isMobile ? 0.8 : 0;

if(keys["ArrowUp"]) speed = 0.6;

car.position.z -= speed;

/* Tilt control */

if(isMobile){
car.position.x += tilt * 0.01;
}

/* Keyboard control */

if(keys["ArrowLeft"]) car.position.x -= 0.45;
if(keys["ArrowRight"]) car.position.x += 0.45;

car.position.x = Math.max(-8,Math.min(8,car.position.x));

/* Enemy movement */

enemies.forEach(e=>{

e.position.z += 0.35;

if(
Math.abs(e.position.z-car.position.z)<2 &&
Math.abs(e.position.x-car.position.x)<1.6
){
endGame("💥 GAME OVER");
}

});

/* Coins */

coins.forEach(c=>{

c.rotation.y += 0.1;

if(
Math.abs(c.position.z-car.position.z)<2 &&
Math.abs(c.position.x-car.position.x)<1.6
){

scene.remove(c);

score++;

scoreDisplay.innerText = "Coins: " + score;

}

});

/* Finish */

if(car.position.z < -5800){
endGame("🏁 YOU FINISHED!");
}

}

/* Camera */

camera.position.x = car.position.x;
camera.position.z = car.position.z + 14;

camera.lookAt(car.position);

renderer.render(scene,camera);

}

animate();

/* End Game */

function endGame(text){

gameOver = true;

const message = document.getElementById("message");
message.innerHTML = text;
message.style.display = "block";

}

/* Resize */

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
